services:

  mariadb:
    build:
      context: ./requirements/mariadb
    image: mariadb:inception
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_root_password
      - db_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build:
      context: ./requirements/wordpress
    image: wordpress:inception
    container_name: wordpress
    restart: unless-stopped
    depends_on:
      - mariadb
      #- redis
    env_file: .env
    environment:
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      WP_ADMIN_PASSWORD_FILE: /run/secrets/wp_admin_password
      WP_USER_PASSWORD_FILE: /run/secrets/wp_user_password
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
  
  nginx:
    build:
      context: ./requirements/nginx
    image: nginx:inception
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    env_file: .env
    volumes:
      - wordpress_data:/var/www/wordpress:ro
    ports:
      - "443:443"
    networks:
      - inception

  redis:
    build:
      context: ./requirements/bonus/redis
    image: redis:inception
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - inception

  ftp:
    build:
      context: ./requirements/bonus/ftp
    image: ftp:inception
    container_name: ftp
    restart: unless-stopped
    depends_on: 
      - wordpress
    env_file: .env
    environment:
      FTP_PASSWORD_FILE: /run/secrets/ftp_password
      PASV_ADDRESS: ""
    secrets:
      - ftp_password
    volumes:
      - wordpress_data:/var/www/wordpress
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    networks:
      - inception

  adminer:
    build:
      context: ./requirements/bonus/adminer
    image: adminer:inception
    container_name: adminer
    restart: unless-stopped
    depends_on: 
      - mariadb
    ports:
      - "8080:8080"
    networks:
      - inception

  portfolio:
    build:
      context: ./requirements/bonus/portfolio
    image: portfolio:inception
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "7070:7070"
    networks:
      - inception

  node:
    build:
      context: ./requirements/bonus/observability/node
    image: node:inception
    container_name: node
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - inception

  prometheus:
    build:
      context: ./requirements/bonus/observability/prometheus
    image: prometheus:inception
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - node
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - inception

  grafana:
    build:
      context: ./requirements/bonus/observability/grafana
    image: grafana:inception
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    env_file: .env
    environment:
      GRAFANA_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - inception

networks:
  inception:
    driver: bridge

volumes:
  mariadb_data: 
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/redis
  prometheus_data:
  grafana_data:

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  ftp_password:
    file: ../secrets/ftp_password.txt
  grafana_admin_password:
    file: ../secrets/grafana_admin_password.txt